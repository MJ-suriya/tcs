<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vehicle & scrap Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .brand-icon {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 0;
    }

    /* Logo styling */
    .logo-img {
      width: 220px;
      height: 220px;
      object-fit: contain;

      /* Make it match your dark theme */
      filter: brightness(0) invert(1);

      /* Soft glow effect like premium apps */
      opacity: 0.9;
      transition: 0.3s ease;
    }

    .logo-img:hover {
      transform: scale(1.08);
      opacity: 1;
    }
  </style>
</head>

<body class="login-page">
  <div class="login-split">
    <div class="login-brand">
      <div class="brand-inner">
        <div class="brand-icon">
          <img src="logo.png" alt="Logo" class="logo-img" />
        </div>
        <h1 class="brand-title">The Chennai Silks</h1>
        <p class="brand-tagline">Make records Simplified.</p>
      </div>
    </div>
    <div class="login-form-area">
      <div class="login-card form-structured">
        <h2 class="form-heading">Welcome back</h2>
        <p class="form-sub">Sign in to your account</p>
        <div id="loginAlert"></div>
        <div class="mb-4">
          <label class="form-label fw-500">Username or ECno</label>
          <input type="text" id="username" class="form-control cds-input" placeholder="Enter username"
            autocomplete="username" />
        </div>
        <div class="mb-4">
          <label class="form-label fw-500">Password</label>
          <div class="input-group">
            <input type="password" id="password" class="form-control cds-input" placeholder="Enter password"
              autocomplete="current-password" style="border-top-right-radius: 0; border-bottom-right-radius: 0;" />
            <button class="btn btn-outline-secondary" type="button" onclick="togglePasswordVisibility('password', this)"
              style="border-top-right-radius: 8px; border-bottom-right-radius: 8px; border: 1.5px solid var(--border); border-left: none; background: #fafbfc; color: var(--text-muted); padding: 0 14px;">👁️</button>
          </div>
        </div>
        <button class="btn cds-btn-primary w-100" onclick="doLogin()">Sign In</button>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>

</html>
