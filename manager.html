<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TCS — Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css" />
  <style>
    .module-title {
      padding: 10px 14px;
      font-size: 13px;
      text-transform: uppercase;
      color: #aaa;
      cursor: pointer;
      font-weight: 600;
      border-radius: 6px;
      transition: all 0.3s ease;
    }

    .module-title:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .module-title.active-module {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.15);
    }

    .module-items {
      display: none;
      padding-left: 10px;
    }

    .module-items.open {
      display: block;
    }
  </style>
</head>

<body class="dashboard-page">
  <div class="cds-sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="brand-rupee">₹</span>
      <span class="brand-name">TCS</span>
      <button class="sidebar-close-btn d-lg-none" onclick="toggleSidebar()" aria-label="Close sidebar">✕</button>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-module" id="vehicleModuleSidebar">
        <div class="module-title" onclick="toggleModule('vehicleMenu')">Vehicle Log</div>
        <div id="vehicleMenu" class="module-items">
          <a href="#" class="nav-link" onclick="showSection('vehicleFuel')">Fuel Logs</a>
          <a href="#" class="nav-link" onclick="showSection('vehicleExpenses')">Expenses</a>
          <a href="#" class="nav-link" onclick="showSection('vehicleApprovals')">Approvals</a>
          <a href="#" class="nav-link" onclick="showSection('vehicleReports')">Reports</a>
        </div>
      </div>
      <div class="sidebar-module" id="scrapModuleSidebar">
        <div class="module-title" onclick="toggleModule('scrapMenu')">Scrap</div>
        <div id="scrapMenu" class="module-items">
          <a href="#" class="nav-link" onclick="showSection('scrapApprovals')">Approvals</a>
          <a href="#" class="nav-link" onclick="showSection('scrapReports')">Reports</a>
        </div>
      </div>
      <div class="sidebar-module admin-only">
        <div class="module-title" onclick="toggleModule('adminMenu')">Admin</div>
        <div id="adminMenu" class="module-items">
          <a href="#" class="nav-link" onclick="showSection('users')">Users</a>
        </div>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-badge"><span class="user-avatar" id="sidebarAvatar">M</span>
        <div>
          <div class="user-name" id="sidebarUsername">Manager</div>
          <div class="user-role">ERP User</div>
        </div>
      </div>
      <button class="btn cds-btn-logout mt-2 w-100" onclick="showChangePasswordModal()"
        style="background-color: transparent; border: 1px solid rgba(255,255,255,0.2);">Change Password</button>
      <button class="btn cds-btn-logout mt-2 w-100" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
  <div class="cds-main">
    <div class="cds-topbar"><button class="sidebar-toggle d-lg-none" onclick="toggleSidebar()">☰</button>
      <h2 class="topbar-title" id="pageTitle">Dashboard</h2>
      <div class="topbar-date" id="todayDate"></div>
    </div>
    <div class="cds-content" id="mainContent">

      <div id="section-vehicleFuel" class="d-none">
        <div class="row g-4">
          <div class="col-12">
            <div class="cds-card">
              <div class="card-header-cds d-flex justify-content-between align-items-center flex-wrap gap-2">
                <h5 class="mb-0">Recent Fuel Logs</h5>
                <div class="d-flex align-items-center gap-1">
                  <button class="btn cds-btn-sm" onclick="printFuelLogs()">🖨️ Print</button>
                  <button class="btn cds-btn-sm" onclick="loadFuelHistory()">↻ Refresh</button>
                </div>
              </div>
              <!-- Filter Bar -->
              <div class="p-3 border-bottom bg-light d-flex align-items-center flex-wrap gap-2" style="font-size: 13px;">
                <div class="d-flex align-items-center gap-1">
                  <label class="mb-0 text-muted" style="white-space: nowrap;">Branch:</label>
                  <select id="fuelBranchFilter" class="form-select cds-input sm" style="width: 130px;" onchange="filterFuelLogs()">
                    <option value="">All Branches</option>
                  </select>
                </div>
                <div class="d-flex align-items-center gap-1">
                  <label class="mb-0 text-muted" style="white-space: nowrap;">Vehicle:</label>
                  <select id="fuelVehicleFilter" class="form-select cds-input sm" style="width: 130px;" onchange="filterFuelLogs()">
                    <option value="">All Vehicles</option>
                  </select>
                </div>
                <div class="d-flex align-items-center gap-1">
                  <label class="mb-0 text-muted" style="white-space: nowrap;">From:</label>
                  <input type="date" id="fuelFromDateFilter" class="form-control cds-input sm" style="width: 125px;" onchange="filterFuelLogs()" />
                </div>
                <div class="d-flex align-items-center gap-1">
                  <label class="mb-0 text-muted" style="white-space: nowrap;">To:</label>
                  <input type="date" id="fuelToDateFilter" class="form-control cds-input sm" style="width: 125px;" onchange="filterFuelLogs()" />
                </div>
                <button class="btn btn-secondary btn-sm px-2 py-1" onclick="clearFuelFilters()" style="font-size: 11px;">Clear</button>
              </div>
              <div id="fuelHistoryAlert"></div>
              <div id="fuelHistoryList"></div>
            </div>
          </div>
        </div>
      </div>
      <div id="section-vehicleApprovals" class="d-none">
        <div id="vehicleApprovalAlert"></div>
        <div class="cds-card">
          <div class="card-header-cds d-flex justify-content-between align-items-center flex-wrap gap-2">
            <h5 class="mb-0">Reviewed Vehicle Logs</h5>
            <div class="d-flex align-items-center flex-wrap gap-2">
              <div class="filter-item">
                <label class="small text-muted mb-0" style="white-space: nowrap;">Branch:</label>
                <select id="approvalBranchFilter" class="form-select cds-input sm" style="width: 140px;" onchange="filterApprovalLogs()">
                  <option value="">All Branches</option>
                </select>
              </div>

              <div class="filter-item">
                <label class="small text-muted mb-0" style="white-space: nowrap;">Vehicle:</label>
                <select id="approvalVehicleSelect" class="form-select cds-input sm" style="width: 180px;"
                  onchange="renderFilteredReviewedLogs()">
                  <option value="">All Vehicles</option>
                </select>
              </div>

              <div class="filter-item">
                <label class="small text-muted mb-0" style="white-space: nowrap;">From:</label>
                <input type="date" id="approvalFromDateFilter" class="form-control cds-input sm" style="width: 130px;"
                  onchange="renderFilteredReviewedLogs()" />
              </div>

              <div class="filter-item">
                <label class="small text-muted mb-0" style="white-space: nowrap;">To:</label>
                <input type="date" id="approvalToDateFilter" class="form-control cds-input sm" style="width: 130px;"
                  onchange="renderFilteredReviewedLogs()" />
              </div>

              <div class="d-flex gap-1">
                <button class="btn cds-btn-sm" onclick="clearApprovalFilters()">Clear</button>
                <button class="btn cds-btn-sm" onclick="loadVehicleApprovals()">↻ Refresh</button>
              </div>
            </div>
          </div>
          <div id="vehicleReviewedList"></div>
        </div>
      </div>
      <div id="section-vehicleReports" class="d-none">
        <div class="cds-card">
          <div class="card-header-cds d-flex justify-content-between align-items-center flex-wrap gap-2">
            <h5 class="mb-0">Vehicle Reports</h5>
            <div class="d-flex align-items-center flex-wrap gap-2">
              <div class="filter-item">
                <label class="small text-muted mb-0" style="white-space: nowrap;">Branch:</label>
                <select id="reportBranchSelect" class="form-select cds-input sm" style="width: 150px;"
                  onchange="renderFilteredVehicleReports()">
                  <option value="">All Branches</option>
                </select>
              </div>

              <div class="filter-item">
                <label class="small text-muted mb-0" style="white-space: nowrap;">Vehicle:</label>
                <select id="reportVehicleSelect" class="form-select cds-input sm" style="width: 180px;"
                  onchange="renderFilteredVehicleReports()">
                  <option value="">All Vehicles</option>
                </select>
              </div>

              <div class="filter-item">
                <label class="small text-muted mb-0" style="white-space: nowrap;">Bunk:</label>
                <select id="reportBunkSelect" class="form-select cds-input sm" style="width: 150px;"
                  onchange="renderFilteredVehicleReports()">
                  <option value="">All Bunks</option>
                </select>
              </div>

              <div class="filter-item">
                <label class="small text-muted mb-0" style="white-space: nowrap;">From:</label>
                <input type="date" id="reportFromDateFilter" class="form-control cds-input sm" style="width: 130px;"
                  onchange="renderFilteredVehicleReports()" />
              </div>

              <div class="filter-item">
                <label class="small text-muted mb-0" style="white-space: nowrap;">To:</label>
                <input type="date" id="reportToDateFilter" class="form-control cds-input sm" style="width: 130px;"
                  onchange="renderFilteredVehicleReports()" />
              </div>

              <div class="d-flex gap-1">
                <button class="btn cds-btn-sm" onclick="clearReportFilters()">Clear</button>
                <button class="btn cds-btn-sm" onclick="printVehicleReport()">🖨️ Print</button>
                <button class="btn cds-btn-sm" onclick="loadVehicleReports()">↻ Refresh</button>
              </div>
            </div>
          </div>
          <div id="vehicleReportAlert"></div>
          <div id="vehicleReportList"></div>
        </div>
      </div>
      <div id="section-vehicleExpenses" class="d-none">
        <div class="row g-4">
          <div class="col-12">
            <div class="cds-card">
              <div class="card-header-cds d-flex justify-content-between align-items-center flex-wrap gap-2">
                <h5 class="mb-0">Expense Log</h5>
                <div class="d-flex align-items-center gap-1">
                  <button class="btn cds-btn-sm" onclick="printExpenseLogs()">🖨️ Print</button>
                  <button class="btn cds-btn-sm" onclick="loadVehicleExpenses()">↻ Refresh</button>
                </div>
              </div>
              <!-- Filter Bar -->
              <div class="p-3 border-bottom bg-light d-flex align-items-center flex-wrap gap-2" style="font-size: 13px;">
                <div class="d-flex align-items-center gap-1">
                  <label class="mb-0 text-muted" style="white-space: nowrap;">Branch:</label>
                  <select id="expenseBranchFilter" class="form-select cds-input sm" style="width: 130px;" onchange="filterExpenses()">
                    <option value="">All Branches</option>
                  </select>
                </div>
                <div class="d-flex align-items-center gap-1">
                  <label class="mb-0 text-muted" style="white-space: nowrap;">Vehicle:</label>
                  <select id="expenseVehicleFilter" class="form-select cds-input sm" style="width: 130px;" onchange="filterExpenses()">
                    <option value="">All Vehicles</option>
                  </select>
                </div>
                <div class="d-flex align-items-center gap-1">
                  <label class="mb-0 text-muted" style="white-space: nowrap;">From:</label>
                  <input type="date" id="expenseFromDateFilter" class="form-control cds-input sm" style="width: 125px;" onchange="filterExpenses()" />
                </div>
                <div class="d-flex align-items-center gap-1">
                  <label class="mb-0 text-muted" style="white-space: nowrap;">To:</label>
                  <input type="date" id="expenseToDateFilter" class="form-control cds-input sm" style="width: 125px;" onchange="filterExpenses()" />
                </div>
                <button class="btn btn-secondary btn-sm px-2 py-1" onclick="clearExpenseFilters()" style="font-size: 11px;">Clear</button>
              </div>
              <div id="vehicleExpensesListWrap">
                <div class="table-responsive">
                  <table class="table cds-table">
                    <thead>
                      <tr>
                        <th>Date</th>
                        <th>Vehicle</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>Description</th>
                        <th>By</th>
                        <th>Status</th>
                        <th>Action</th>
                      </tr>
                    </thead>
                    <tbody id="vehicleExpensesList">
                      <!-- Rendered dynamically -->
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div id="section-scrapApprovals" class="d-none">
        <div class="cds-card mb-4">
          <div class="card-header-cds d-flex justify-content-between align-items-center flex-wrap gap-2">
            <h5 class="mb-0">Pending Scrap Approvals</h5>
            <div class="d-flex align-items-center gap-2 flex-wrap">
              <div class="filter-item">
                <label class="small text-muted mb-0" style="white-space: nowrap;">Branch:</label>
                <select id="scrapApprovalBranchSelect" class="form-select cds-input sm" style="width: 150px;" onchange="renderFilteredScrapApprovals()">
                  <option value="">All Branches</option>
                </select>
              </div>
              <div class="d-flex gap-1">
                <button class="btn cds-btn-sm" onclick="loadScrapApprovals()">↻ Refresh</button>
              </div>
            </div>
          </div>
          <div id="scrapApprovalAlert"></div>
          <div id="scrapPendingList"></div>
        </div>
      </div>
      <div id="section-scrapReports" class="d-none">
        <div class="cds-card">
          <div class="card-header-cds">
            <h5>Scrap Reports</h5>
            <div class="d-flex align-items-center gap-2 flex-wrap">
              <div class="filter-item">
                <label class="small text-muted mb-0" style="white-space: nowrap;">Branch:</label>
                <select id="scrapReportBranchSelect" class="form-select cds-input sm" style="width: 150px;"
                  onchange="loadScrapReports()">
                  <option value="">All Branches</option>
                </select>
              </div>
              <div class="filter-item">
                <label class="small text-muted mb-0" style="white-space: nowrap;">Product:</label>
                <select id="scrapReportProductSelect" class="form-select cds-input sm" style="width: 150px;"
                  onchange="loadScrapReports()">
                  <option value="">All Products</option>
                </select>
              </div>
              <div class="filter-item">
                <label class="small text-muted mb-0" style="white-space: nowrap;">From:</label>
                <input type="date" id="scrapReportFromDate" class="form-control cds-input sm"
                  style="width: 130px;" onchange="loadScrapReports()" />
              </div>
              <div class="filter-item">
                <label class="small text-muted mb-0" style="white-space: nowrap;">To:</label>
                <input type="date" id="scrapReportToDate" class="form-control cds-input sm"
                  style="width: 130px;" onchange="loadScrapReports()" />
              </div>
              <div class="d-flex gap-1">
                <button class="btn cds-btn-sm" onclick="printScrapReport()">🖨️ Print</button>
                <button class="btn cds-btn-sm" onclick="loadScrapReports()">↻ Refresh</button>
              </div>
            </div>
          </div>
          <div id="scrapReportAlert"></div>
          <div id="scrapReportList"></div>
        </div>
      </div>
      <div id="section-users" class="d-none">
        <div class="row g-4">
          <div class="col-lg-4">
            <div class="cds-card form-structured">
              <div class="card-header-cds">
                <h5>Add User</h5>
              </div>
              <div id="userAlert"></div>
              <div class="mb-3"><label class="form-label">Username</label><input type="text" id="newUsername"
                  class="form-control cds-input" /></div>
              <div class="mb-3"><label class="form-label">Password</label><input type="password" id="newPassword"
                  class="form-control cds-input" /></div>
              <div class="mb-4"><label class="form-label">Role</label><select id="newRole"
                  class="form-select cds-input">
                  <option value="manager">Manager</option>
                  <option value="admin">Admin</option>
                  <option value="security">Security</option>
                  <option value="pettycashier">Petty Cashier</option>
                </select></div><button class="btn cds-btn-primary w-100" onclick="addUser()">Create User</button>
            </div>
          </div>
          <div class="col-lg-8">
            <div class="cds-card">
              <div class="card-header-cds">
                <h5>All Users</h5>
              </div>
              <div id="userList"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="app.js"></script>
  <script>
    const inputStart = document.getElementById("startDateTime");
    if (inputStart && typeof formatDateTime12h === 'function') {
      inputStart.value = formatDateTime12h(new Date());
    }
    const inputEnd = document.getElementById("endDateTime");
    if (inputEnd && typeof formatDateTime12h === 'function') {
      inputEnd.value = formatDateTime12h(new Date());
    }
  </script>
  <script>
    function toggleModule(menuId) {
      const menus = ['vehicleMenu', 'scrapMenu', 'adminMenu'];
      menus.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        const title = el.previousElementSibling;
        if (id === menuId) {
          el.classList.toggle('open');
          title.classList.toggle('active-module');
        } else {
          el.classList.remove('open');
          if (title) title.classList.remove('active-module');
        }
      });
    }
  </script>
</body>

</html>
