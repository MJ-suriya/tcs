<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TCS — Security</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dashboard-page">
  <div class="cds-sidebar" id="sidebar">
    <div class="sidebar-brand"><span class="brand-rupee">₹</span><span class="brand-name">TCS</span></div>
    <nav class="sidebar-nav">
      <div class="text-uppercase small px-2 pt-2 text-muted">Vehicle Log</div>
      <a href="#" class="nav-link active" onclick="showSection('vehicleEntry')">New Entry</a>
      <a href="#" class="nav-link" onclick="showSection('vehicleHistory')">My Entries</a>
      <div class="text-uppercase small px-2 pt-4 text-muted">Scrap</div>
      <a href="#" class="nav-link" onclick="showSection('scrapEntry')">New Scrap Entry</a>
      <a href="#" class="nav-link" onclick="showSection('scrapHistory')">My Scrap Entries</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-badge"><span class="user-avatar manager-avatar" id="sidebarAvatar">S</span><div><div class="user-name" id="sidebarUsername">Security</div><div class="user-role">Security</div></div></div>
      <button class="btn cds-btn-logout mt-2 w-100" onclick="showChangePasswordModal()" style="background-color: transparent; border: 1px solid rgba(255,255,255,0.2);">Change Password</button>
      <button class="btn cds-btn-logout mt-2 w-100" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
  <div class="cds-main">
    <div class="cds-topbar"><button class="sidebar-toggle d-lg-none" onclick="toggleSidebar()">☰</button><h2 class="topbar-title" id="pageTitle">Vehicle Log - New Entry</h2><div class="topbar-date" id="todayDate"></div></div>
    <div class="cds-content" id="mainContent">
      <div id="section-vehicleEntry"><div class="row g-4"><div class="col-lg-6"><div class="cds-card form-structured"><div class="card-header-cds"><h5>Create Vehicle Log</h5></div><div id="vehicleAlert"></div><div class="mb-3"><label class="form-label">Driver Name</label><input id="driverName" class="form-control cds-input" /></div><div class="mb-3"><label class="form-label">Vehicle Number</label><input id="vehicleNumber" list="vehicleNumberList" class="form-control cds-input" onblur="applyVehicleBaseline()" placeholder="Enter or pick vehicle number" /><datalist id="vehicleNumberList"></datalist></div><div class="row g-3"><div class="col-md-6"><label class="form-label">From</label><input id="fromLocation" class="form-control cds-input" /></div><div class="col-md-6"><label class="form-label">To</label><input id="toLocation" class="form-control cds-input" /></div></div><div class="row g-3 mt-1"><div class="col-md-6"><label class="form-label">Start Date & Time</label><input id="startDateTime" type="datetime-local" class="form-control cds-input" /></div><div class="col-md-6"><label class="form-label">End Date & Time</label><input id="endDateTime" type="datetime-local" class="form-control cds-input" /></div></div><div class="row g-3 mt-1"><div class="col-md-4"><label class="form-label">Start KM</label><input id="startKm" readonly class="form-control cds-input" value="0" /></div><div class="col-md-4"><label class="form-label">End KM</label><input id="endKm" type="number" min="0" class="form-control cds-input" oninput="calcVehicleDistance();calcVehicleFuelUsed();" /></div><div class="col-md-4"><label class="form-label">Distance</label><input id="distanceTravelled" readonly class="form-control cds-input" value="0.00" /></div></div><div class="row g-3 mt-1"><div class="col-md-3"><label class="form-label">Available Fuel</label><input id="availableFuel" readonly class="form-control cds-input" value="0" /></div><div class="col-md-3"><label class="form-label">Fuel Added</label><input id="fuelAdded" type="number" min="0" step="0.1" value="0" class="form-control cds-input" oninput="calcVehicleFuelUsed()" /></div><div class="col-md-3"><label class="form-label">Remaining Fuel (optional)</label><input id="remainingFuel" type="number" min="0" step="0.1" class="form-control cds-input" oninput="calcVehicleFuelUsed()" /></div><div class="col-md-3"><label class="form-label">Fuel Fill Date</label><input id="fuelFillDate" type="date" class="form-control cds-input" /></div></div><div class="row g-3 mt-1"><div class="col-md-4"><label class="form-label">Expected Mileage</label><input id="expectedMileage" readonly class="form-control cds-input" /></div><div class="col-md-4"><label class="form-label">Actual Mileage</label><input id="actualMileage" readonly class="form-control cds-input" /></div><div class="col-md-4 d-flex align-items-end"><div id="mileageDelta"></div></div></div><div class="row g-3 mt-1"><div class="col-md-6"><label class="form-label">Fuel Used (optional)</label><input id="fuelUsedInput" type="number" min="0" step="0.1" class="form-control cds-input" oninput="calcVehicleFuelUsed()" /></div><div class="col-md-6"><label class="form-label">Reason (optional)</label><input id="mileageReason" class="form-control cds-input" placeholder="If mileage differs, mention reason" /></div></div><div class="row g-3 mt-1"><div class="col-md-6"><label class="form-label">Fuel Used (calculated)</label><input id="fuelUsed" readonly class="form-control cds-input" value="0.00" /></div><div class="col-md-6 d-flex align-items-end"><div id="lowFuelBadge"></div></div></div><div class="cds-card mt-3 p-3"><h6 class="mb-3">Vehicle Profile Setup</h6><div class="row g-2"><div class="col-md-4"><input id="profileOpeningKm" type="number" min="0" class="form-control cds-input" placeholder="Opening KM" /></div><div class="col-md-4"><input id="profileOpeningFuel" type="number" min="0" step="0.1" class="form-control cds-input" placeholder="Opening Fuel (L)" /></div><div class="col-md-4"><input id="profileExpectedMileage" type="number" min="0" step="0.1" class="form-control cds-input" placeholder="Expected km/L" /></div></div><button class="btn cds-btn-sm mt-2" onclick="saveVehicleProfile()">Save Vehicle Profile</button></div><div class="mt-3"><div class="d-flex justify-content-between align-items-center mb-2"><label class="form-label mb-0">Expenses</label><button class="btn cds-btn-sm" onclick="addVehicleExpenseRow()">+ Add Expense</button></div><div id="vehicleExpenseRows"></div></div><div class="row g-2 mt-3"><div class="col-md-6"><button class="btn cds-btn-sm w-100" onclick="saveVehicleWaitingDraft()">Save to Waiting List</button></div><div class="col-md-6"><button class="btn cds-btn-primary w-100" onclick="submitVehicleLog()">Submit for Approval</button></div></div></div></div><div class="col-lg-6"><div class="cds-card mb-4"><div class="card-header-cds"><h5>Waiting List</h5><button class="btn cds-btn-sm" onclick="loadVehicleWaitingList()">↻ Refresh</button></div><div id="vehicleWaitingAlert"></div><div id="vehicleWaitingList"></div></div><div class="cds-card"><div class="card-header-cds"><h5>My Vehicle Logs</h5></div><div id="vehicleHistoryAlertCompact"></div><div id="vehicleHistoryListCompact"></div></div></div></div></div>
      <div id="section-vehicleHistory" class="d-none"><div class="cds-card"><div class="card-header-cds"><h5>My Vehicle Logs</h5><button class="btn cds-btn-sm" onclick="loadVehicleHistory()">↻ Refresh</button></div><div id="vehicleHistoryAlert"></div><div id="vehicleHistoryList"></div></div></div>
      <div id="section-scrapEntry" class="d-none">
        <div class="row g-4">
          <div class="col-lg-5">
            <div class="cds-card form-structured">
              <div class="card-header-cds"><h5>New Scrap Entry</h5></div>
              <div id="scrapEntryAlert"></div>
              <div class="mb-3"><label class="form-label">Company Name</label><input type="text" id="scrapCompany" class="form-control cds-input" /></div>
              <div class="mb-3"><label class="form-label">Vehicle Number</label><input type="text" id="scrapVehicle" class="form-control cds-input text-uppercase" /></div>
              <div class="mb-3"><label class="form-label">Owner Name</label><input type="text" id="scrapOwner" class="form-control cds-input" /></div>
              <div class="mb-3"><label class="form-label">Product</label><select id="scrapProductSelect" class="form-select cds-input" onchange="calcScrapTotal()"><option value="">Select Product</option></select></div>
              <div class="row g-3 mb-3">
                <div class="col-6"><label class="form-label">Weight (KG)</label><input type="number" id="scrapWeight" min="0" class="form-control cds-input" oninput="calcScrapTotal()" /></div>
                <div class="col-6"><label class="form-label">Price/KG (₹)</label><input type="number" id="scrapPriceKg" class="form-control cds-input" readonly /></div>
              </div>
              <div class="mb-4"><label class="form-label">Total Amount (₹)</label><input type="number" id="scrapTotalAmount" class="form-control cds-input" readonly /></div>
              <button class="btn cds-btn-primary w-100" onclick="submitScrapEntry()">Submit Entry</button>
            </div>
          </div>
          <div class="col-lg-7"><div class="cds-card"><div class="card-header-cds"><h5>My Pending Entries</h5><button class="btn cds-btn-sm" onclick="loadScrapMyEntries()">↻ Refresh</button></div><div id="scrapMyEntryList"></div></div></div>
        </div>
      </div>
      <div id="section-scrapHistory" class="d-none"><div class="cds-card"><div class="card-header-cds"><h5>My Scrap Entries</h5><button class="btn cds-btn-sm" onclick="loadScrapMyHistory()">↻ Refresh</button></div><div id="scrapHistoryAlert"></div><div id="scrapHistoryList"></div></div></div>
    </div>
  </div>
  <script src="app.js"></script>
  <script>
    const input = document.getElementById("startDateTime");
  
    function setMinDateTime() {
      const now = new Date();
  
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
  
      const currentDateTime = `${year}-${month}-${day}T${hours}:${minutes}`;
  
      input.min = currentDateTime;   // ❌ blocks past
      input.value = currentDateTime; // ✅ default = now
    }
  
    setMinDateTime();
  </script>
</body>
</html>
